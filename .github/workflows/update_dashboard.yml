name: Update Dashboard Data

on:
  schedule:
    - cron: '0 * * * *'   # runs every hour
  workflow_dispatch:        # allows manual run from GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch Notion data
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          TRANSACTIONS_DB: ${{ secrets.TRANSACTIONS_DB }}
        run: python scripts/fetch_notion_data.py

      - name: Commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update dashboard data [skip ci]"
          git push
